---
name: Initialize submodules
description: >
  Initializes all submodules recursively. When the repository name ends
  in -private, rewrites submodule URLs listed in .private-submodules.conf
  to their -private variants and uses the provided token for authentication.
  Errors if the repo is private but no token is provided.

inputs:
  private-token:
    description: >
      PAT with access to private submodules. Required when the repository
      name ends in -private.
    required: false
    default: ''

runs:
  using: composite

  steps:
    - name: Verify private token is available
      if: endsWith(github.repository, '-private') && inputs.private-token == ''
      shell: bash
      run: |
        echo "::error::Repository ends in '-private' but no private-token was provided. Set the PRIVATE_REPO_PAT secret."
        exit 1

    - name: Initialize submodules (private)
      if: endsWith(github.repository, '-private')
      shell: bash
      env:
        TOKEN: ${{ inputs.private-token }}
      run: |
        set -euo pipefail
        echo "::add-mask::${TOKEN}"
        # GitHub-issued PATs and installation tokens are [A-Za-z0-9_]; catch
        # stray whitespace/newline from a miscopied secret before it becomes
        # a 401 the user blames on "wrong PAT".
        if ! [[ "$TOKEN" =~ ^[A-Za-z0-9_]+$ ]]; then
          echo "::error::PRIVATE_REPO_PAT contains unexpected characters; check the secret for stray whitespace."
          exit 1
        fi
        GITHUB_TOKEN="$TOKEN" scripts/ci-init-submodules.sh

    - name: Initialize submodules (public)
      if: "!endsWith(github.repository, '-private')"
      shell: bash
      run: git submodule update --init --recursive
