---
name: Initialize submodules
description: >
  Initializes all submodules recursively. When the repository name ends
  in -private, rewrites submodule URLs listed in .private-submodules.conf
  to their -private variants and authenticates using the GitHub App
  installation token (preferred) or the provided PAT. Errors if the repo
  is private but neither auth source is configured.

inputs:
  client-id:
    description: GitHub App Client ID (vars.NITRO_CI_APP_CLIENT_ID).
    required: false
    default: ''
  app-private-key:
    description: GitHub App private key PEM (secrets.NITRO_CI_APP_PRIVATE_KEY).
    required: false
    default: ''
  pat:
    description: PAT fallback used when client-id is unset (secrets.PRIVATE_REPO_PAT).
    required: false
    default: ''

outputs:
  token:
    description: Resolved token (App installation token or PAT) — exposed so callers can reuse it (e.g. docker build secrets).
    value: ${{ steps.app-token.outputs.token || inputs.pat }}

runs:
  using: composite

  steps:
    # Same recipe is duplicated inline in submodule-pin-check.yml —
    # that workflow can't call composite actions under pull_request_target.
    - id: scope
      if: inputs.client-id != ''
      shell: bash
      run: |
        repos=$(
          echo "${GITHUB_REPOSITORY##*/}"
          awk 'NF && !/^[[:space:]]*#/ {print $1"-private"}' .private-submodules.conf
        )
        echo "App-token repo scope:"
        echo "$repos"
        {
          echo 'repos<<EOF'
          echo "$repos"
          echo 'EOF'
        } >> "$GITHUB_OUTPUT"

    - id: app-token
      if: inputs.client-id != ''
      uses: actions/create-github-app-token@v3
      with:
        client-id: ${{ inputs.client-id }}
        private-key: ${{ inputs.app-private-key }}
        owner: ${{ github.repository_owner }}
        repositories: ${{ steps.scope.outputs.repos }}

    - name: Verify private token is available
      if: endsWith(github.repository, '-private') && steps.app-token.outputs.token == '' && inputs.pat == ''
      shell: bash
      run: |
        echo "::error::Repository ends in '-private' but no auth was provided. Configure the CI GitHub App (vars.NITRO_CI_APP_CLIENT_ID and secrets.NITRO_CI_APP_PRIVATE_KEY) or set the PRIVATE_REPO_PAT secret."
        exit 1

    - name: Initialize submodules (private)
      if: endsWith(github.repository, '-private')
      shell: bash
      env:
        TOKEN: ${{ steps.app-token.outputs.token || inputs.pat }}
      run: |
        set -euo pipefail
        echo "::add-mask::${TOKEN}"
        # GitHub-issued PATs and installation tokens are [A-Za-z0-9_]; catch
        # stray whitespace/newline from a miscopied secret before it becomes
        # a 401 the user blames on "wrong token".
        if ! [[ "$TOKEN" =~ ^[A-Za-z0-9_]+$ ]]; then
          echo "::error::Private token contains unexpected characters; check the secret for stray whitespace."
          exit 1
        fi
        GITHUB_TOKEN="$TOKEN" scripts/ci-init-submodules.sh

    - name: Initialize submodules (public)
      if: "!endsWith(github.repository, '-private')"
      shell: bash
      run: git submodule update --init --recursive
