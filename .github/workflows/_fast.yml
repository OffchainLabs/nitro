---
name: fast-ci-jobs
on:
  workflow_call:

permissions:
  contents: read

jobs:
  lint-and-build:
    name: Lint and Build
    runs-on: arbitrator-ci
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.PRIVATE_REPO_PAT || github.token }}

      - uses: ./.github/actions/init-submodules
        with:
          private-token: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Setup CI
        uses: ./.github/actions/ci-setup

      - name: Build
        run: make -j8 build test-go-deps

      - name: Build all lint dependencies
        run: make -j8 build-node-deps

      - name: GolangCI Lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20  # v9
        with:
          version: v2.5

      - name: Custom Lint
        run: |
          go run ./linters ./...
