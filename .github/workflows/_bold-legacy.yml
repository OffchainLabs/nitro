---
name: bold-legacy
on:
  workflow_call:

permissions:
  contents: read

jobs:
  bold-legacy:
    name: Run Bold Legacy challenge tests
    runs-on: arbitrator-ci
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.PRIVATE_REPO_PAT || github.token }}

      - uses: ./.github/actions/init-submodules
        with:
          private-token: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Setup CI
        uses: ./.github/actions/ci-setup

      - name: Build
        run: make -j8 build test-go-deps

      - name: run challenge tests
        run: >-
          ${{ github.workspace }}/.github/workflows/gotestsum.sh --tags legacychallengetest
          --run TestChallenge --timeout 60m --cover

      - name: Archive detailed run log
        uses: actions/upload-artifact@v5
        with:
          name: full.log
          path: full.log

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe  # v5
        with:
          fail_ci_if_error: false
          files: ./coverage.txt,./coverage-redis.txt
          verbose: false
          token: ${{ secrets.CODECOV_TOKEN }}
