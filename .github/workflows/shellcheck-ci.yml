---
name: ShellCheck CI
run-name: ShellCheck CI triggered from @${{ github.actor }} of ${{ github.head_ref }}

on:
  workflow_dispatch:
  merge_group:
  pull_request:
  push:
    branches: [master, main]

permissions:
  contents: read

jobs:
  shellcheck:
    name: Run ShellCheck
    runs-on: ubuntu-4

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run ShellCheck
        # No version tags exist for this action; pinned to the current master SHA.
        uses: ludeeus/action-shellcheck@00b27aa7cb85167568cb48a3838b75f4265f2bca  # master
        with:
          ignore_paths: >-
            ./fastcache/**
            ./contracts/**
            ./safe-smart-account/**
            ./go-ethereum/**
            ./nitro-testnode/**
            ./brotli/**
            ./arbitrator/**
