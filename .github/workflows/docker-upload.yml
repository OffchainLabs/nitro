name: Build and Publish Docker Image

on:
  workflow_dispatch:
  push:
    branches:
      - eigenda
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+-*" 

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]
        exclude:
          - platform: ${{ github.event_name == 'pull_request' && 'linux/arm64' }}
    runs-on: ${{ matrix.platform == 'linux/amd64' && 'ubuntu-latest' || 'buildjet-8vcpu-ubuntu-2204-arm' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache-${{ matrix.platform }}
          key: buildx-${{ matrix.platform }}-${{ hashFiles('Dockerfile') }}
          restore-keys: buildx-${{ matrix.platform }}-

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/nitro-eigenda
          tags: |
            ${{ github.ref_name }}-${{ matrix.platform }}
            latest-${{ matrix.platform }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          platform: ${{ matrix.platform }}
          target: nitro-node
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=local,src=/tmp/.buildx-cache-${{ matrix.platform }}
          cache-to: type=local,dest=/tmp/.buildx-cache-${{ matrix.platform }}-new,mode=max

      - name: Move Cache
        run: |
          rm -rf /tmp/.buildx-cache-${{ matrix.platform }}
          mv /tmp/.buildx-cache-${{ matrix.platform }}-new /tmp/.buildx-cache-${{ matrix.platform }}

  merge-multiarch:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/nitro-eigenda
          tags: |
            ${{ github.ref_name }}
            latest

      - name: Create and Push Multi-Platform Manifest
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/${{ github.repository_owner }}/nitro-eigenda:${{ github.ref_name }} \
            --tag ghcr.io/${{ github.repository_owner }}/nitro-eigenda:latest \
            ghcr.io/${{ github.repository_owner }}/nitro-eigenda:${{ github.ref_name }}-linux-amd64 \
            ghcr.io/${{ github.repository_owner }}/nitro-eigenda:${{ github.ref_name }}-linux-arm64

      - name: Verify Multi-Platform Image
        run: |
          docker buildx imagetools inspect ghcr.io/${{ github.repository_owner }}/nitro-eigenda:${{ github.ref_name }}
