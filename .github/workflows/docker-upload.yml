name: Build and Publish Docker Image

on:
  workflow_dispatch:
  pull_request: ## testing only
  push:
    branches:
      - eigenda
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+-*" 


## concurrently run to speed up builds
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]
    runs-on: ${{ matrix.platform == 'linux/amd64' && 'linux-2xl' || 'linux-xl-arm' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true
      
      ## cache build steps across architectures for reuse in subsequent
      ## builds
      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache-${{ matrix.platform }}
          key: buildx-${{ matrix.platform }}-${{ hashFiles('Dockerfile') }}
          restore-keys: buildx-${{ matrix.platform }}-

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      ## generate image metadata
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/nitro-eigenda
            ghcr.io/${{ github.repository_owner }}/nitro-eigenda-dev
          tags: |
            ${{ github.ref_name }}-${{ matrix.platform }}
            latest-${{ matrix.platform }}

      - name: Build and push nitro-node image (prod)
        uses: docker/build-push-action@v5
        with:
          platform: ${{ matrix.platform }}
          target: nitro-node
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/nitro-eigenda:${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=local,src=/tmp/.buildx-cache-${{ matrix.platform }}
          cache-to: type=local,dest=/tmp/.buildx-cache-${{ matrix.platform }}-new,mode=max

      - name: Build and push nitro-node image (dev)
        uses: docker/build-push-action@v5
        with:
          platform: ${{ matrix.platform }}
          target: nitro-node-dev
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/nitro-eigenda-dev:${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=local,src=/tmp/.buildx-cache-${{ matrix.platform }}
          cache-to: type=local,dest=/tmp/.buildx-cache-${{ matrix.platform }}-new,mode=max

      - name: Move Cache
        run: |
          rm -rf /tmp/.buildx-cache-${{ matrix.platform }}
          mv /tmp/.buildx-cache-${{ matrix.platform }}-new /tmp/.buildx-cache-${{ matrix.platform }}

  ## Combine containers from different architectures into the same namespace
  ## ensuring that docker pulls can specify intended arch 
  merge-multiarch:
    needs: build
    runs-on: linux-2xl
  
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
  
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
  
      - name: Create and Push Multi-Platform Manifest (Prod)
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/${{ github.repository_owner }}/nitro-eigenda:${{ github.ref_name }} \
            --tag ghcr.io/${{ github.repository_owner }}/nitro-eigenda:latest \
            ghcr.io/${{ github.repository_owner }}/nitro-eigenda:${{ github.ref_name }}-linux-amd64 \
            ghcr.io/${{ github.repository_owner }}/nitro-eigenda:${{ github.ref_name }}-linux-arm64
  
      - name: Create and Push Multi-Platform Manifest (Dev)
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/${{ github.repository_owner }}/nitro-eigenda-dev:${{ github.ref_name }} \
            --tag ghcr.io/${{ github.repository_owner }}/nitro-eigenda-dev:latest \
            ghcr.io/${{ github.repository_owner }}/nitro-eigenda-dev:${{ github.ref_name }}-linux-amd64 \
            ghcr.io/${{ github.repository_owner }}/nitro-eigenda-dev:${{ github.ref_name }}-linux-arm64
  
      - name: Verify Multi-Platform Images
        run: |
          docker buildx imagetools inspect ghcr.io/${{ github.repository_owner }}/nitro-eigenda:${{ github.ref_name }}
          docker buildx imagetools inspect ghcr.io/${{ github.repository_owner }}/nitro-eigenda-dev:${{ github.ref_name }}