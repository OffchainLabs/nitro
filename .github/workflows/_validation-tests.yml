---
name: validation-tests
on:
  workflow_call:

jobs:
  validation-tests:
    name: Block validation tests
    runs-on: arbitrator-ci
    env:
      # The block input JSON can be generated using following command:
      # `gotestsum --format short-verbose -- -run "TestProgramStorage\$" ./system_tests/... --count 1 -- --recordBlockInputs.enable=true --recordBlockInputs.WithBaseDir=target/ --recordBlockInputs.WithTimestampDirEnabled=false --recordBlockInputs.WithBlockIdInFileNameEnabled=false`
      # This will output a JSON file in `system_tests/target/TestProgramStorage`.
      # IMPORTANT: This has to be done on an x86_64 Linux machine (so that GH runner can use it).
      INPUT_FILE: ${{ github.workspace }}/.github/workflows/testdata/block_inputs.json
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup CI
        uses: ./.github/actions/ci-setup

      - name: Build
        run: |
          make build-replay-env
          make build-prover-bin
          make build-jit
          make build-validation-server

      - name: Run arbitrator prover on block input json
        run: |
          target/bin/prover target/machines/latest/machine.v2.wavm.br -b \
            --json-inputs="${{ env.INPUT_FILE }}" | tee /tmp/prover_output.txt
          grep -q "Computed state matches the expected one" /tmp/prover_output.txt

      - name: Run jit prover on block input json
        id: jit
        run: |
          target/bin/jit --binary target/machines/latest/replay.wasm --require-success --debug \
            json --inputs '${{ env.INPUT_FILE }}' | tee /tmp/jit_output.txt

          grep -q "Computed state matches the expected one" /tmp/jit_output.txt
          JIT_HASH=$(grep -oP 'hash \K(0x)?[a-f0-9]+' /tmp/jit_output.txt)
          echo "jit_hash=$JIT_HASH" >> $GITHUB_OUTPUT

      - name: Download all module roots from Dockerfile
        id: module-roots
        run: |
          # Download every module root the Dockerfile currently supports, so
          # the validation server discovers all of them under target/machines/
          # at startup and we can address each one by hash in the next step.
          # Capture into a variable (not process substitution) so a non-zero
          # exit from extract-dockerfile-module-roots.sh — which is how it
          # signals "zero matches, CI has been silently weakened" — propagates
          # and fails the step under the default `set -eo pipefail`.
          MODULE_ROOTS=$(scripts/extract-dockerfile-module-roots.sh Dockerfile)
          HASHES=()
          while IFS=' ' read -r NAME HASH; do
            echo "Downloading $NAME ($HASH)..."
            scripts/download-machine.sh "$NAME" "$HASH"
            mv "$HASH" target/machines/
            # download-machine.sh creates a `latest` symlink in cwd; remove it
            # so the target/machines/latest built by `make build-replay-env`
            # stays intact.
            rm -f latest
            HASHES+=("$HASH")
          done <<< "$MODULE_ROOTS"

          {
            echo "hashes<<EOF"
            printf '%s\n' "${HASHES[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run Rust validation server (Native & Continuous)
        env:
          MODULE_ROOT_HASHES: ${{ steps.module-roots.outputs.hashes }}
        run: |
          # Capture the expected hash once
          JIT_HASH="${{ steps.jit.outputs.jit_hash }}"

          # Refuse to run a degraded validation that only checks `latest`.
          # If MODULE_ROOT_HASHES is empty here, something went wrong upstream
          # (e.g. the download step silently produced no hashes) and the
          # multi-root coverage this job is supposed to provide would be lost.
          if ! grep -qE '[^[:space:]]' <<< "$MODULE_ROOT_HASHES"; then
            echo "❌ MODULE_ROOT_HASHES is empty — refusing to run degraded validation"
            exit 1
          fi

          # Every module root in MODULE_ROOT_HASHES supports the ArbOS version
          # of the TestProgramStorage block, so each one must produce the same
          # block hash as the JIT prover. A mismatch (or error) on any single
          # root fails the job.
          send_validate() {
            local ID=$1
            local MODULE_ROOT=$2
            if [ -z "$MODULE_ROOT" ]; then
              jq -n --slurpfile input "${{ env.INPUT_FILE }}" --argjson id "$ID" \
                '{jsonrpc: "2.0", id: $id, method: "validation_validate", params: [$input[0]]}'
            else
              jq -n --slurpfile input "${{ env.INPUT_FILE }}" --argjson id "$ID" --arg mr "$MODULE_ROOT" \
                '{jsonrpc: "2.0", id: $id, method: "validation_validate", params: [$input[0], $mr]}'
            fi | curl -s -X POST http://localhost:4141/ \
              -H "Content-Type: application/json" -d @-
          }

          check_response() {
            local LABEL=$1
            local EXPECTED_ID=$2
            local RESPONSE=$3

            local RESP_ID SERVER_HASH
            RESP_ID=$(echo "$RESPONSE" | jq -r '.id')
            if [ "$RESP_ID" != "$EXPECTED_ID" ]; then
              echo "❌ $LABEL JSON-RPC id mismatch: expected $EXPECTED_ID, got $RESP_ID"
              echo "   response: $RESPONSE"
              return 1
            fi

            SERVER_HASH=$(echo "$RESPONSE" | jq -r '.result.BlockHash')
            if [ "$JIT_HASH" != "$SERVER_HASH" ]; then
              echo "❌ $LABEL hash mismatch: JIT=$JIT_HASH server=$SERVER_HASH"
              echo "   response: $RESPONSE"
              return 1
            fi

            echo "✅ $LABEL matches JIT ($SERVER_HASH)"
          }

          validate_mode() {
            local MODE_NAME=$1
            local SERVER_ARGS=$2

            echo "::group::Testing Mode: $MODE_NAME"

            # 1. Start server in background, capturing output so a crash
            # surfaces the actual error instead of just a hash/id mismatch.
            local LOG_FILE="/tmp/validator-$MODE_NAME.log"
            echo "Starting server ($MODE_NAME)..."
            target/bin/validator $SERVER_ARGS > "$LOG_FILE" 2>&1 &
            SERVER_PID=$!

            # 2. Wait for server to respond (up to 2 minutes)
            echo "Waiting for validator ($MODE_NAME) to start..."
            if ! timeout 120s bash -c 'until curl -s localhost:4141 > /dev/null; do sleep 1; done'; then
              echo "❌ Server ($MODE_NAME) failed to start within 2 min timeout"
              echo "::group::Validator log ($MODE_NAME)"
              cat "$LOG_FILE" || true
              echo "::endgroup::"
              kill $SERVER_PID 2>/dev/null || true
              exit 1
            fi

            # 3. Validate once against the default (latest) module root, then
            # once per Dockerfile-listed module root.
            local EXIT_CODE=0
            local ID=1
            local RESPONSE
            RESPONSE=$(send_validate "$ID" "")
            check_response "$MODE_NAME latest" "$ID" "$RESPONSE" || EXIT_CODE=1

            while IFS= read -r MODULE_ROOT; do
              [ -z "$MODULE_ROOT" ] && continue
              ID=$((ID + 1))
              RESPONSE=$(send_validate "$ID" "$MODULE_ROOT")
              check_response "$MODE_NAME $MODULE_ROOT" "$ID" "$RESPONSE" || EXIT_CODE=1
            done <<< "$MODULE_ROOT_HASHES"

            # 4. Stop the server
            kill $SERVER_PID
            wait $SERVER_PID 2>/dev/null || true

            if [ "$EXIT_CODE" -ne 0 ]; then
              echo "::group::Validator log ($MODE_NAME)"
              cat "$LOG_FILE" || true
              echo "::endgroup::"
              echo "❌ $MODE_NAME Validation failed"
              exit "$EXIT_CODE"
            fi
            echo "✅ $MODE_NAME Validation successful"
            echo "::endgroup::"
          }

          # --- RUN TESTS ---

          # Run Validator in Native mode
          validate_mode "Native" ""

          # Run Validator in Continuous mode
          validate_mode "Continuous" "--mode continuous"
