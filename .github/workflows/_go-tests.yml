---
name: nitro-go-tests
on:
  workflow_call:
    inputs:
      run-name:
        required: true
        type: string
        description: "The name of the test run. It will be used for labeling artifacts."
      run-defaults-a:
        required: false
        type: boolean
      run-defaults-b:
        required: false
        type: boolean
      run-flaky:
        required: false
        type: boolean
      run-pathdb-a:
        required: false
        type: boolean
      run-pathdb-b:
        required: false
        type: boolean
      run-stylus:
        required: false
        type: boolean
      run-challenge:
        required: false
        type: boolean
      run-l3challenge:
        required: false
        type: boolean
      run-legacy-challenge:
        required: false
        type: boolean
      run-race:
        required: false
        type: boolean
      run-long:
        required: false
        type: boolean
      run-execution-spec-tests:
        required: false
        type: boolean
      run-pebble-a:
        required: false
        type: boolean
      run-pebble-b:
        required: false
        type: boolean
      run-defaults-a-mel:
        required: false
        type: boolean
      run-defaults-b-mel:
        required: false
        type: boolean
      run-pathdb-a-mel:
        required: false
        type: boolean
      run-pathdb-b-mel:
        required: false
        type: boolean
      run-flaky-mel:
        required: false
        type: boolean

permissions:
  contents: read

jobs:
  go-tests:
    name: Go tests
    runs-on: arbitrator-ci
    # Per-job hard cap so a hung test terminates with a Go stack trace rather
    # than GitHub killing the runner (which yields no useful diagnostics).
    timeout-minutes: 150
    services:
      redis:
        image: redis
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.PRIVATE_REPO_PAT || github.token }}

      - id: submods
        uses: ./.github/actions/init-submodules
        with:
          client-id: ${{ vars.NITRO_CI_APP_CLIENT_ID }}
          app-private-key: ${{ secrets.NITRO_CI_APP_PRIVATE_KEY }}
          pat: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Setup CI
        uses: ./.github/actions/ci-setup

      - name: Set environment variables
        run: |
          mkdir -p target/tmp/deadbeefbee
          echo "TMPDIR=$(pwd)/target/tmp/deadbeefbee" >> "$GITHUB_ENV"
          echo "GOMEMLIMIT=6GiB" >> "$GITHUB_ENV"
          echo "GOGC=80" >> "$GITHUB_ENV"
          echo "GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> "$GITHUB_ENV"
          # Scale pollUntil / retryUntilFound timeouts for loaded shared CI runners.
          # Consumed by system_tests helpers (see getTestTimeoutScale in common_test.go).
          echo "NITRO_TEST_TIMEOUT_SCALE=2.0" >> "$GITHUB_ENV"

      - name: Build
        run: make -j8 build test-go-deps

      - name: Build node dependencies
        run: make -j8 build-node-deps

      # --------------------- PATHDB MODE ---------------------

      - name: run tests without race detection and path state scheme (A-batch)
        if: inputs.run-pathdb-a
        run: >-
          ${{ github.workspace }}/.github/workflows/gotestsum.sh
          --tags cionly --timeout 90m --cover --test_state_scheme path
          --junitfile test-results/junit-pathdb-a.xml --run '^Test[A-L]' --reduce-parallelism

      - name: run tests without race detection and path state scheme (B-batch)
        if: inputs.run-pathdb-b
        run: >-
          ${{ github.workspace }}/.github/workflows/gotestsum.sh
          --tags cionly --timeout 90m --cover --test_state_scheme path
          --junitfile test-results/junit-pathdb-b.xml --skip '^Test[A-L]' --reduce-parallelism

      # --------------------- DEFAULTS MODE ---------------------

      - name: run tests without race detection and hash state scheme (A-batch)
        if: inputs.run-defaults-a
        run: >-
          ${{ github.workspace }}/.github/workflows/gotestsum.sh
          --tags cionly --timeout 60m --cover --coverprofile coverage-a.txt --test_state_scheme hash
          --junitfile test-results/junit-defaults-a.xml --run '^Test[A-L]'
      - name: run tests without race detection and hash state scheme (B-batch)
        if: inputs.run-defaults-b
        run: >-
          ${{ github.workspace }}/.github/workflows/gotestsum.sh
          --tags cionly --timeout 60m --cover --coverprofile coverage-b.txt --test_state_scheme hash
          --junitfile test-results/junit-defaults-b.xml --skip '^Test[A-L]'
      # --------------------- PATHDB MEL MODE ---------------------

      - name: run tests without race detection and path state scheme (A-batch, MEL)
        if: inputs.run-pathdb-a-mel
        run: >-
          ${{ github.workspace }}/.github/workflows/gotestsum.sh
          --tags cionly --timeout 90m --cover --test_state_scheme path
          --junitfile test-results/junit-pathdb-a-mel.xml --run '^Test[A-L]' --reduce-parallelism --test_mel

      - name: run tests without race detection and path state scheme (B-batch, MEL)
        if: inputs.run-pathdb-b-mel
        run: >-
          ${{ github.workspace }}/.github/workflows/gotestsum.sh
          --tags cionly --timeout 90m --cover --test_state_scheme path
          --junitfile test-results/junit-pathdb-b-mel.xml --skip '^Test[A-L]' --reduce-parallelism --test_mel

      # --------------------- DEFAULTS MEL MODE ---------------------

      - name: run tests without race detection and hash state scheme (A-batch, MEL)
        if: inputs.run-defaults-a-mel
        run: >-
          ${{ github.workspace }}/.github/workflows/gotestsum.sh
          --tags cionly --timeout 60m --test_state_scheme hash
          --junitfile test-results/junit-defaults-a-mel.xml --run '^Test[A-L]' --test_mel
      - name: run tests without race detection and hash state scheme (B-batch, MEL)
        if: inputs.run-defaults-b-mel
        run: >-
          ${{ github.workspace }}/.github/workflows/gotestsum.sh
          --tags cionly --timeout 60m --test_state_scheme hash
          --junitfile test-results/junit-defaults-b-mel.xml --skip '^Test[A-L]' --test_mel      
      - name: run redis tests
        if: inputs.run-defaults-a
        run: >-
          gotestsum --format short-verbose -- -p 1 -run TestRedis ./arbnode/... ./system_tests/...
          -coverprofile=coverage-redis.txt -covermode=atomic -coverpkg=./... -- --test_redis=redis://localhost:6379/0

      # --------------------- FLAKY MODE --------------------------

      # Flaky tests retry once (via gotestsum.sh) and block on failure: if a test
      # fails even after a retry, it's not just flaky — it's broken.
      - name: run flaky tests (hash state scheme)
        if: inputs.run-flaky
        run: >-
          ${{ github.workspace }}/.github/workflows/gotestsum.sh
          --tags cionly --timeout 60m --test_state_scheme hash --flaky
          --junitfile test-results/junit-flaky-hash.xml

      - name: run flaky tests (path state scheme)
        if: inputs.run-flaky
        run: >-
          ${{ github.workspace }}/.github/workflows/gotestsum.sh
          --tags cionly --timeout 60m --test_state_scheme path --flaky
          --junitfile test-results/junit-flaky-path.xml

      - name: run flaky tests (hash state scheme, MEL)
        if: inputs.run-flaky-mel
        run: >-
          ${{ github.workspace }}/.github/workflows/gotestsum.sh
          --tags cionly --timeout 60m --test_state_scheme hash --flaky --test_mel
          --junitfile test-results/junit-flaky-mel-hash.xml

      - name: run flaky tests (path state scheme, MEL)
        if: inputs.run-flaky-mel
        run: >-
          ${{ github.workspace }}/.github/workflows/gotestsum.sh
          --tags cionly --timeout 60m --test_state_scheme path --flaky --test_mel
          --junitfile test-results/junit-flaky-mel-path.xml

      # --------------------- CHALLENGE MODES ---------------------

      - name: build challenge tests
        if: inputs.run-challenge
        run: >-
          ${{ github.workspace }}/.github/workflows/gotestsum.sh --tags challengetest
          --run TestChallenge --timeout 120m --cover
          --junitfile test-results/junit-challenge.xml

      - name: run L3 challenge tests
        if: inputs.run-l3challenge
        run: >-
          ${{ github.workspace }}/.github/workflows/gotestsum.sh
          --tags challengetest --run TestL3Challenge --timeout 120m --cover
          --junitfile test-results/junit-l3challenge.xml

      - name: run legacy challenge tests
        if: inputs.run-legacy-challenge
        run: >-
          ${{ github.workspace }}/.github/workflows/gotestsum.sh --tags legacychallengetest
          --run TestChallenge --timeout 60m --cover
          --junitfile test-results/junit-legacy-challenge.xml

      # --------------------- STYLUS MODE ---------------------

      - name: run stylus tests
        if: inputs.run-stylus
        run: >-
          ${{ github.workspace }}/.github/workflows/gotestsum.sh
          --tags stylustest --run TestProgramArbitrator --timeout 60m --cover
          --junitfile test-results/junit-stylus.xml

      # --------------------- RACE MODE ---------------------

      - name: run race tests
        if: inputs.run-race
        run: >-
          ${{ github.workspace }}/.github/workflows/gotestsum.sh 
          --race --timeout 90m --test_state_scheme hash
          --junitfile test-results/junit-race.xml

      # --------------------- LONG MODE ---------------------

      - name: run long tests
        if: inputs.run-long
        run: >-
          ${{ github.workspace }}/.github/workflows/gotestsum.sh --tags stylustest
          --run TestProgramLong --timeout 60m --cover
          --junitfile test-results/junit-long.xml

      # --------------------- EXECUTION SPEC MODE ---------------------

      - name: run execution spec tests
        if: inputs.run-execution-spec-tests
        env:
          PRIVATE_REPO_TOKEN: ${{ steps.submods.outputs.token }}
        run: ${{ github.workspace }}/.github/workflows/runExecutionSpecTests.sh

      # --------------------- PEBBLE MODE ---------------------

      - name: run pebble tests (A-batch)
        if: inputs.run-pebble-a
        run: >-
          ${{ github.workspace }}/.github/workflows/gotestsum.sh --timeout 120m --test_database_engine pebble
          --junitfile test-results/junit-pebble-a.xml --run '^Test[A-N]' --reduce-parallelism
      - name: run pebble tests (B-batch)
        if: inputs.run-pebble-b
        run: >-
          ${{ github.workspace }}/.github/workflows/gotestsum.sh --timeout 120m --test_database_engine pebble
          --junitfile test-results/junit-pebble-b.xml --skip '^Test[A-N]' --reduce-parallelism
      # --------------------- PROCESS JUNIT LOGS ---------------------

      - name: Process JUnit XML logs
        if: always()
        run: python3 ${{ github.workspace }}/.github/workflows/process_junit.py test-results/

      - name: Upload Go test Artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: junit-reports-go-${{ inputs.run-name }}
          path: test-results/junit*.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: false
          files: ./coverage.txt,./coverage-a.txt,./coverage-b.txt,./coverage-redis.txt
          verbose: false
          token: ${{ secrets.CODECOV_TOKEN }}

      # --------------------- ARCHIVE LOGS FOR ALL MODES ---------------------

      - name: Archive detailed run log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.run-name }}-full.log
          path: full.log
