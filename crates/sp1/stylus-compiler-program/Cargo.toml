[package]
name = "stylus-compiler-program"
description = "SP1 program wrapping wasmer singlepass compiler for provable compilation"
version = "0.1.0"
edition = "2024"
authors.workspace = true
homepage.workspace = true
license.workspace = true
publish.workspace = true
repository.workspace = true
rust-version.workspace = true

[dependencies]
anyhow = { workspace = true }
sp1-zkvm = { workspace = true }
wasmer = { workspace = true, features = ["sys", "compiler", "singlepass"] }
prover = { workspace = true, features = ["sp1", "native"] }
