[package]
name = "sp1-builder"
description = "A builder crate that builds SP1 programs, necessary metadata, then run bootloader to generated bootloaded SP1 program"
version = "0.1.0"
edition = "2024"

[dependencies]
sp1-core-executor = { git = "https://github.com/succinctlabs/sp1", rev = "be6ebfe" }
sp1-sdk = { git = "https://github.com/succinctlabs/sp1", rev = "be6ebfe", features = ["profiling"] }

clap = { workspace = true, features = ["cargo", "derive"] }
serde_json = { workspace = true }
wasmer = { workspace = true, features = ["llvm"] }
wasmparser = { workspace = true }

[build-dependencies]
sp1-build = { git = "https://github.com/succinctlabs/sp1", rev = "be6ebfe", features = ["may_dump_elf"] }
