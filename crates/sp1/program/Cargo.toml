[package]
name = "program"
description = "Initial SP1 program for validating Arbitrum blocks, it will be bootloaded for optimizations."
version = "0.1.0"
edition = "2024"

[dependencies]
arbutil = { workspace = true }
caller-env = { workspace = true, features = ["brotli"] }
prover = { workspace = true, features = ["sp1", "native"] }
sp1-zkvm = { git = "https://github.com/succinctlabs/sp1", rev = "be6ebfe", features = ["untrusted_programs", "may_dump_elf"] }
validation = { workspace = true, features = ["rkyv"] }
wasmer = { workspace = true, features = ["sys", "compiler", "singlepass", "wasmparser"] }
wasmer-types = { workspace = true }
wasmer-vm = { workspace = true, features = ["force-baremetal"] }

bytes = { workspace = true }
corosensei = { workspace = true }
eyre = { workspace = true }
hex = { workspace = true }
num-traits = { workspace = true }
once_cell = { workspace = true }
rand_pcg = { workspace = true }
rand = { workspace = true }
ruint2 = { workspace = true }
secp256k1 = { workspace = true, features = ["recovery", "global-context"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
tiny-keccak = { workspace = true, features = ["keccak"] }
